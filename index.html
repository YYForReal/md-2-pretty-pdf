<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown to PDF 转换器</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/themes.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📄 Markdown to PDF 转换器</h1>
            <p>将您的 Markdown 文档转换为精美的 PDF 文件</p>
        </header>

        <main class="main-content">
            <!-- 左侧编辑区域 -->
            <section class="editor-section">
                <div class="editor-header">
                    <h2>📝 Markdown 编辑器</h2>
                    <div class="editor-actions">
                        <button id="clearBtn" class="btn btn-secondary">清空</button>
                        <button id="loadSampleBtn" class="btn btn-secondary">加载示例</button>
                    </div>
                </div>
                <textarea id="markdownInput" placeholder="在此输入您的 Markdown 内容...

# 示例标题
这是一个段落示例。

## 二级标题

- 列表项 1
- 列表项 2
- 列表项 3

**粗体文本** 和 *斜体文本*"></textarea>
            </section>

            <!-- 中间预览区域 -->
            <section class="preview-section">
                <div class="preview-header">
                    <h2>👁️ 实时预览</h2>
                </div>
                <div class="preview-container" id="preview-container">
                    <div id="previewContent" class="preview-content"></div>
                </div>
            </section>

            <!-- 右侧控制面板 -->
            <section class="control-section">
                <div class="control-panel">
                    <h3>🎨 样式设置</h3>

                    <!-- 预设主题 -->
                    <div class="control-group">
                        <label>预设主题</label>
                        <select id="themeSelect">
                            <option value="default">默认主题</option>
                            <option value="academic">学术风格</option>
                            <option value="modern">现代风格</option>
                            <option value="elegant">优雅风格</option>
                            <option value="minimal">极简风格</option>
                            <option value="eye-care">护眼模式</option>
                            <option value="classic">古典文学</option>
                        </select>
                    </div>

                    <!-- 页面设置 -->
                    <div class="control-group">
                        <label>页面尺寸</label>
                        <select id="pageSizeSelect">
                            <option value="a4">A4</option>
                            <option value="letter">Letter</option>
                            <option value="a5">A5</option>
                        </select>
                    </div>

                    <!-- 字体设置 -->
                    <div class="control-group">
                        <label>字体</label>
                        <select id="fontFamilySelect">
                            <option value="system">系统默认</option>
                            <option value="chinese-serif">中文衬线（宋体）</option>
                            <option value="chinese-kai">中文楷体</option>
                            <option value="chinese-hei">中文黑体</option>
                            <option value="chinese-fang">中文仿宋</option>
                            <option value="chinese-song">中文宋体</option>
                            <option value="serif">英文衬线</option>
                            <option value="sans-serif">英文无衬线</option>
                            <option value="mono">等宽字体</option>
                        </select>
                    </div>

                    <!-- 字体大小 -->
                    <div class="control-group">
                        <label>基础字体大小</label>
                        <input type="range" id="fontSizeSlider" min="10" max="20" value="14">
                        <span id="fontSizeValue">14px</span>
                    </div>

                    <!-- 字体颜色 -->
                    <div class="control-group">
                        <label>字体颜色</label>
                        <div class="color-input-group">
                            <input type="color" id="fontColorPicker" value="#333333">
                            <input type="text" id="fontColorText" value="#333333" class="color-text">
                        </div>
                    </div>

                    <!-- 背景设置 -->
                    <div class="control-group">
                        <label>🖼️ 背景设置</label>
                        <div class="background-controls">
                            <!-- 背景类型选择 -->
                            <div class="background-type-selector">
                                <label>
                                    <input type="radio" name="backgroundType" value="solid" checked>
                                    纯色背景
                                </label>
                                <label>
                                    <input type="radio" name="backgroundType" value="image">
                                    图片背景
                                </label>
                            </div>

                            <!-- 纯色背景设置 -->
                            <div id="solidBackgroundControls" class="background-subcontrols">
                                <div class="color-input-group">
                                    <label>背景颜色</label>
                                    <input type="color" id="bgColorPicker" value="#ffffff">
                                    <input type="text" id="bgColorText" value="#ffffff" class="color-text">
                                </div>
                            </div>

                            <!-- 图片背景设置 -->
                            <div id="imageBackgroundControls" class="background-subcontrols" style="display: none;">
                                <div class="file-input-group">
                                    <label>背景图片</label>
                                    <input type="file" id="bgImageInput" accept="image/*" class="file-input">
                                    <button id="bgImageClearBtn" class="btn btn-small btn-secondary">清除图片</button>
                                </div>

                                <div class="image-preview" id="bgImagePreview" style="display: none;">
                                    <img id="bgImagePreviewImg" src="" alt="背景图片预览">
                                </div>

                                <div class="background-options">
                                    <div class="option-group">
                                        <label>背景尺寸</label>
                                        <select id="bgSizeSelect">
                                            <option value="cover">覆盖 (Cover)</option>
                                            <option value="contain">适应 (Contain)</option>
                                            <option value="100% 100%">拉伸 (Stretch)</option>
                                            <option value="auto">原始 (Auto)</option>
                                        </select>
                                    </div>

                                    <div class="option-group">
                                        <label>背景位置</label>
                                        <select id="bgPositionSelect">
                                            <option value="center center">居中</option>
                                            <option value="top center">顶部居中</option>
                                            <option value="bottom center">底部居中</option>
                                            <option value="left center">左侧居中</option>
                                            <option value="right center">右侧居中</option>
                                        </select>
                                    </div>

                                    <div class="option-group">
                                        <label>背景重复</label>
                                        <select id="bgRepeatSelect">
                                            <option value="no-repeat">不重复</option>
                                            <option value="repeat">重复</option>
                                            <option value="repeat-x">水平重复</option>
                                            <option value="repeat-y">垂直重复</option>
                                        </select>
                                    </div>

                                    <div class="option-group">
                                        <label>背景透明度</label>
                                        <input type="range" id="bgOpacitySlider" min="0" max="100" value="100">
                                        <span id="bgOpacityValue">100%</span>
                                    </div>
                                </div>
                            </div>

                            <!-- AI 背景图生成 -->
                            <div class="ai-background-section">
                                <div class="ai-background-toggle" id="aiBackgroundToggle">
                                    <span class="ai-background-icon">🤖</span>
                                    <span class="ai-background-title">AI 背景图生成</span>
                                    <span class="ai-background-arrow">▸</span>
                                </div>
                                <div class="ai-background-content" id="aiBackgroundContent" style="display: none;">
                                    <!-- LLM 配置 -->
                                    <div class="ai-config-section">
                                        <div class="ai-config-toggle" id="aiConfigToggle">
                                            <span>LLM 配置</span>
                                            <span class="ai-config-arrow">▸</span>
                                        </div>
                                        <div class="ai-config-content" id="aiConfigContent" style="display: none;">
                                            <div class="control-group">
                                                <label>模型提供商</label>
                                                <select id="aiProviderSelect">
                                                    <option value="custom">自定义</option>
                                                    <option value="openai">OpenAI (GPT-4o)</option>
                                                    <option value="anthropic">Anthropic (Claude)</option>
                                                    <option value="google">Google AI (Gemini)</option>
                                                    <option value="deepseek">DeepSeek</option>
                                                    <option value="siliconflow">硅基流动</option>
                                                    <option value="aliyun">阿里通义</option>
                                                    <option value="tencent">腾讯混元</option>
                                                    <option value="baidu">百度文心</option>
                                                    <option value="nvidia">NVIDIA</option>
                                                </select>
                                            </div>
                                            <div class="control-group">
                                                <label>Base URL</label>
                                                <input type="text" id="aiBaseURL" class="color-text" placeholder="https://api.openai.com/v1" style="width: 100%; padding: 6px 8px;">
                                            </div>
                                            <div class="control-group">
                                                <label>API Key <span class="ai-key-hint">(🔒 仅保存在本地浏览器)</span></label>
                                                <input type="password" id="aiAPIKey" class="color-text" placeholder="sk-..." style="width: 100%; padding: 6px 8px;">
                                                <a href="#" id="aiAPIKeyLink" class="ai-api-key-link" target="_blank" rel="noopener" style="display: none; font-size: 0.8rem; margin-top: 4px;">获取 API Key</a>
                                            </div>
                                            <div class="control-group">
                                                <label>Model Name</label>
                                                <input type="text" id="aiModelName" class="color-text" placeholder="gpt-4o" style="width: 100%; padding: 6px 8px;">
                                            </div>
                                            <div class="ai-config-actions">
                                                <button id="aiSaveConfigBtn" class="btn btn-small btn-success">保存配置</button>
                                                <button id="aiTestConnectionBtn" class="btn btn-small btn-secondary">测试连接</button>
                                            </div>
                                            <div class="ai-config-status" id="aiConfigStatus"></div>
                                        </div>
                                    </div>

                                    <!-- 风格设置 -->
                                    <div class="ai-style-section">
                                        <div class="control-group">
                                            <label>风格描述 <span class="ai-style-hint">(可选，留空则由 AI 自动分析内容)</span></label>
                                            <textarea id="aiStylePrompt" class="ai-style-textarea" placeholder="例如：科技感蓝色渐变、中国风水墨画意境、简约商务风格..." rows="3"></textarea>
                                        </div>
                                        <button id="aiGenerateBtn" class="btn btn-primary ai-generate-btn">
                                            <span class="ai-generate-icon">✨</span> 生成 AI 背景
                                        </button>
                                    </div>

                                    <!-- 生成结果 -->
                                    <div class="ai-result-section" id="aiResultSection" style="display: none;">
                                        <div class="ai-result-status">
                                            状态: <span id="aiResultStatusText">未生成</span>
                                        </div>
                                        <div class="ai-css-preview-toggle" id="aiCssPreviewToggle">
                                            <span>CSS 代码预览</span>
                                            <span class="ai-css-preview-arrow">▸</span>
                                        </div>
                                        <div class="ai-css-preview-content" id="aiCssPreviewContent" style="display: none;">
                                            <pre class="ai-css-code" id="aiCssCode"></pre>
                                        </div>
                                        <div class="ai-result-actions">
                                            <button id="aiApplyBtn" class="btn btn-small btn-success">应用背景</button>
                                            <button id="aiClearBtn" class="btn btn-small btn-secondary">清除 AI 背景</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 操作按钮 -->
                    <div class="action-buttons">
                        <button id="printBtn" class="btn btn-primary">🖨️ 打印</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 引入外部库 -->
    <script src="js/marked@11.1.1.js"></script>
    <script src="https://unpkg.com/jspdf@latest/dist/jspdf.umd.min.js"></script>
    <!-- MathJax 3.0 数学公式渲染库 -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            },
            startup: {
                ready: function () {
                    MathJax.startup.defaultReady();
                    console.log('MathJax is loaded and ready');
                }
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <!-- html2canvas 保留作为备用方案 -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script> -->

    <!-- 引入应用脚本 -->
    <script src="js/aiBackgroundService.js"></script>
    <script src="js/pdfGenerator.js"></script>
    <script src="js/app.js"></script>
    <script src="js/themeManager.js"></script>
</body>
</html>
